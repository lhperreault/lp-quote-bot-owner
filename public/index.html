<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="LP Quote" />
<title>LP Quote Writer</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1a2332;
    --muted: #6b7280;
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --green: #059669;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 16px; line-height: 1.5; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }
  h1 { font-size: 22px; margin: 8px 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
  .card { background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  textarea, input[type=text], input[type=date], input[type=password] {
    width: 100%; padding: 12px; font-size: 16px; border: 1px solid var(--border);
    border-radius: 8px; background: #fff; font-family: inherit; }
  textarea { min-height: 120px; resize: vertical; }
  button { display: inline-block; padding: 12px 18px; font-size: 16px; font-weight: 600;
    border: none; border-radius: 8px; background: var(--blue); color: #fff; cursor: pointer;
    width: 100%; margin-top: 8px; }
  button:disabled { background: #9ca3af; }
  button.secondary { background: #fff; color: var(--text); border: 1px solid var(--border); }
  button.green { background: var(--green); }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .message {
    background: #f0f7ff; border-left: 3px solid var(--blue); border-radius: 6px;
    padding: 14px; white-space: pre-wrap; font-size: 15px; margin-bottom: 12px;
  }
  .meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .meta a { color: var(--blue); text-decoration: none; }
  .err { color: #b91c1c; background: #fef2f2; border-left: 3px solid #b91c1c;
    padding: 10px; border-radius: 6px; font-size: 14px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 10px; background: #fff; border: 1px solid var(--border);
    border-radius: 8px; text-align: center; font-weight: 600; cursor: pointer; font-size: 14px; }
  .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .hidden { display: none; }
  .lead { padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .lead:last-child { border-bottom: none; }
  .lead-name { font-weight: 600; }
  .lead-meta { font-size: 13px; color: var(--muted); }
  .config-link { font-size: 13px; color: var(--muted); text-align: center;
    display: block; margin-top: 16px; }
  .turn-user { background: #eef2ff; border-radius: 10px; padding: 10px 12px;
    margin-bottom: 12px; font-size: 14px; color: #3730a3; white-space: pre-wrap; }
  .turn-bot { margin-bottom: 16px; }
  .reasoning { background: #fffbeb; border-left: 3px solid #f59e0b; border-radius: 6px;
    padding: 10px 12px; margin-top: 10px; font-size: 13px; white-space: pre-wrap; color: #78350f; }
  .reasoning-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: #92400e; margin-bottom: 4px; }
  .dates { margin-top: 10px; }
  .dates-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
  .date-chip { display: inline-block; background: #f0fdf4; border: 1px solid #bbf7d0;
    color: #166534; padding: 6px 10px; border-radius: 999px; font-size: 13px;
    margin: 0 6px 6px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>LP Quote Writer</h1>
  <div class="sub">Paste call notes, get a ready-to-send message.</div>

  <div class="tabs">
    <div class="tab active" data-tab="new">New</div>
    <div class="tab" data-tab="edit">Edit</div>
    <div class="tab" data-tab="book">Book</div>
    <div class="tab" data-tab="recent">Recent</div>
  </div>

  <!-- NEW QUOTE / CHAT -->
  <div class="card" id="tab-new">
    <div id="thread"></div>
    <label id="notes-label">Notes from the call</label>
    <textarea id="notes" placeholder="Sarah Test, 215-555-0142, 22 oak ave doylestown, 2 story 2200 sqft vinyl clean, no porch, end of may"></textarea>
    <div class="row">
      <button id="btn-quote">Write the message</button>
      <button id="btn-new-convo" class="secondary hidden" style="flex:0 0 auto;padding:12px 14px">New</button>
    </div>
  </div>

  <!-- EDIT EXISTING -->
  <div class="card hidden" id="tab-edit">
    <label>Customer first name</label>
    <input type="text" id="edit-name" placeholder="Sarah" />
    <label style="margin-top:12px">What to change</label>
    <textarea id="edit-text" placeholder="swap the date to Saturday May 30, add gutter cleaning for $150"></textarea>
    <button id="btn-edit">Update message</button>
    <div id="result-edit"></div>
  </div>

  <!-- BOOK -->
  <div class="card hidden" id="tab-book">
    <label>Customer first name</label>
    <input type="text" id="book-name" placeholder="Sarah" />
    <label style="margin-top:12px">Date</label>
    <input type="date" id="book-date" />
    <label style="margin-top:12px">Time (optional, default 8:30 AM)</label>
    <input type="text" id="book-time" placeholder="08:30" />
    <button id="btn-book" class="green">Book it</button>
    <div id="result-book"></div>
  </div>

  <!-- RECENT -->
  <div class="card hidden" id="tab-recent">
    <button id="btn-refresh" class="secondary">Refresh recent leads</button>
    <div id="recent-list"></div>
  </div>

</div>

<script>
async function api(path, opts = {}) {
  const res = await fetch(path, {
    method: opts.method || "POST",
    headers: { "Content-Type": "application/json" },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); }
  catch { data = { error: `HTTP ${res.status} — non-JSON response: ${text.slice(0, 300)}` }; }
  if (!res.ok && !data.error) data.error = `HTTP ${res.status}`;
  return { status: res.status, data };
}

function renderMessage(target, data) {
  if (data.error) {
    target.innerHTML = `<div class="err">${data.error}</div>`;
    return;
  }
  let html = "";
  if (data.message) {
    html += `<div class="message">${escapeHtml(data.message)}</div>`;
    html += `<button class="secondary" onclick="copyMsg('${data.record_id || ''}')">Copy message</button>`;
  }
  if (data.airtable_url) {
    html += `<div class="meta"><a href="${data.airtable_url}" target="_blank">Open in Airtable →</a></div>`;
  }
  if (data.calendar_url) {
    html += `<div style="margin-top:12px"><a href="${data.calendar_url}" target="_blank"><button class="green" type="button">Add to Google Calendar</button></a></div>`;
  }
  if (data.summary) {
    html += `<div class="meta">${escapeHtml(data.summary)}</div>`;
  }
  target.innerHTML = html;
  if (data.message) window._lastMessage = data.message;
}


function escapeHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
}

// Tabs
document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    ["new","edit","book","recent"].forEach(id => {
      document.getElementById("tab-" + id).classList.toggle("hidden", id !== t.dataset.tab);
    });
  };
});

// Chat thread state
let currentRecordId = null;
const thread = document.getElementById("thread");
const notesEl = document.getElementById("notes");
const notesLabel = document.getElementById("notes-label");
const btnQuote = document.getElementById("btn-quote");
const btnNewConvo = document.getElementById("btn-new-convo");

function appendUserTurn(text) {
  const div = document.createElement("div");
  div.className = "turn-user";
  div.textContent = text;
  thread.appendChild(div);
}

function appendBotTurn(data) {
  const wrap = document.createElement("div");
  wrap.className = "turn-bot";
  if (data.error) {
    wrap.innerHTML = `<div class="err">${escapeHtml(data.error)}</div>`;
    thread.appendChild(wrap);
    return;
  }
  const msg = data.message || (data.parsed && data.parsed.message) || "";
  const reasoning = (data.parsed && data.parsed.reasoning) || "";
  const extraDates = (data.parsed && data.parsed.extra_dates) || [];
  let html = "";
  if (msg) {
    const msgId = "msg_" + Date.now();
    html += `<div class="message" id="${msgId}">${escapeHtml(msg)}</div>`;
    html += `<button class="secondary" onclick="copyById('${msgId}')">Copy message</button>`;
  }
  if (reasoning) {
    html += `<div class="reasoning"><div class="reasoning-label">Reasoning / breakdown</div>${escapeHtml(reasoning)}</div>`;
  }
  if (extraDates.length) {
    html += `<div class="dates"><div class="dates-label">Other date options</div>`;
    html += extraDates.map(d => `<span class="date-chip">${escapeHtml(d)}</span>`).join("");
    html += `</div>`;
  }
  if (data.airtable_url) {
    html += `<div class="meta" style="margin-top:10px"><a href="${data.airtable_url}" target="_blank">Open in Airtable →</a></div>`;
  }
  wrap.innerHTML = html;
  thread.appendChild(wrap);
  wrap.scrollIntoView({ behavior: "smooth", block: "end" });
}

function copyById(id) {
  const el = document.getElementById(id);
  if (el) {
    navigator.clipboard.writeText(el.textContent);
    alert("Copied!");
  }
}
window.copyById = copyById;

function resetThread() {
  currentRecordId = null;
  thread.innerHTML = "";
  notesEl.value = "";
  notesEl.placeholder = "Sarah Test, 215-555-0142, 22 oak ave doylestown, 2 story 2200 sqft vinyl clean, no porch, end of may";
  notesLabel.textContent = "Notes from the call";
  btnQuote.textContent = "Write the message";
  btnNewConvo.classList.add("hidden");
}

btnNewConvo.onclick = resetThread;

btnQuote.onclick = async () => {
  const text = notesEl.value.trim();
  if (!text) return;
  btnQuote.disabled = true;
  const origLabel = btnQuote.textContent;
  btnQuote.textContent = currentRecordId ? "Sending..." : "Writing...";
  appendUserTurn(text);
  notesEl.value = "";
  try {
    let data;
    if (!currentRecordId) {
      const res = await api("/api/quote", { body: { notes: text } });
      data = res.data;
      if (data.record_id) currentRecordId = data.record_id;
    } else {
      const res = await api("/api/update", { body: { record_id: currentRecordId, edit: text } });
      data = res.data;
    }
    appendBotTurn(data);
    if (currentRecordId) {
      notesLabel.textContent = "Follow-up (edit, question, date change...)";
      notesEl.placeholder = "add gutter cleaning, or did you include the chimney?, or swap to Sat May 30";
      btnQuote.textContent = "Send follow-up";
      btnNewConvo.classList.remove("hidden");
    }
  } catch (e) {
    appendBotTurn({ error: e.message });
    btnQuote.textContent = origLabel;
  } finally {
    btnQuote.disabled = false;
  }
};

// Edit
document.getElementById("btn-edit").onclick = async () => {
  const name = document.getElementById("edit-name").value.trim();
  const edit = document.getElementById("edit-text").value.trim();
  if (!name || !edit) return;
  const btn = document.getElementById("btn-edit");
  const target = document.getElementById("result-edit");
  btn.disabled = true; btn.textContent = "Updating...";
  target.innerHTML = "";
  try {
    const { data } = await api("/api/update", { body: { name, edit } });
    renderMessage(target, data);
  } catch (e) {
    target.innerHTML = `<div class="err">${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = "Update message";
  }
};

// Book
document.getElementById("btn-book").onclick = async () => {
  const name = document.getElementById("book-name").value.trim();
  const date = document.getElementById("book-date").value;
  const time = document.getElementById("book-time").value || "08:30";
  if (!name || !date) return;
  const btn = document.getElementById("btn-book");
  const target = document.getElementById("result-book");
  btn.disabled = true; btn.textContent = "Booking...";
  target.innerHTML = "";
  try {
    const { data } = await api("/api/book", { body: { name, date, time } });
    renderMessage(target, data);
  } catch (e) {
    target.innerHTML = `<div class="err">${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = "Book it";
  }
};

// Recent
document.getElementById("btn-refresh").onclick = async () => {
  const target = document.getElementById("recent-list");
  target.innerHTML = "Loading...";
  try {
    const { data } = await api("/api/find", { method: "GET" });
    if (!data.leads || data.leads.length === 0) {
      target.innerHTML = "<div class='meta'>No leads yet.</div>";
      return;
    }
    target.innerHTML = data.leads.map(l => `
      <div class="lead">
        <div class="lead-name">${escapeHtml(l.name || "(no name)")} — ${escapeHtml(l.status || "")}</div>
        <div class="lead-meta">${escapeHtml(l.address || "")}</div>
        <div class="lead-meta">${escapeHtml(l.date_of_conversation || "")}</div>
      </div>
    `).join("");
  } catch (e) {
    target.innerHTML = `<div class="err">${e.message}</div>`;
  }
};
</script>
</body>
</html>
